services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agora
      POSTGRES_PASSWORD: agora
      POSTGRES_DB: agora
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://agora:agora@db:5432/agora
    depends_on:
      - db

  scraper:
    build: ./service
    command: python main.py
    environment:
      DATABASE_URL: postgresql://agora:agora@db:5432/agora
    depends_on:
      - db

volumes:
  pgdata:
